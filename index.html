<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartilhar P2P - Celular</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1d1d22;
            --primary: #8257e5;
            --text: #e1e1e6;
            --text-secondary: #a8a8b3;
            --success: #00e676;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; box-sizing: border-box; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #323238; background: #121214; color: #fff; box-sizing: border-box; text-align: center; }
        button { width: 100%; background: var(--primary); color: #fff; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .hidden { display: none !important; }
        .chat-box { background: #121214; border: 1px solid #323238; border-radius: 6px; height: 150px; overflow-y: auto; margin: 15px 0; padding: 10px; text-align: left; display: flex; flex-direction: column; }
        .msg { margin: 4px 0; padding: 6px 10px; border-radius: 6px; max-width: 80%; font-size: 14px; }
        .msg.me { background: var(--primary); color: #fff; align-self: flex-end; }
        #status-progress { color: var(--success); font-weight: bold; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Controle P2P</h1>
    <div id="setup-zone">
        <input type="text" id="target-code" placeholder="Digite o código da TV (Ex: ARK5)" style="text-transform:uppercase;">
        <button onclick="connectByCode()">Conectar à TV</button>
    </div>
    <div id="share-zone" class="hidden">
        <div id="status-progress">Conectado com sucesso!</div>
        <input type="file" id="file-input">
        <button onclick="sendFileChunks()">Enviar Arquivo</button>
        <hr style="border-color: #323238; margin: 20px 0;">
        <div class="chat-box" id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chat-input" placeholder="Mensagem para TV...">
            <button onclick="sendText()" style="width: auto;">Enviar</button>
        </div>
    </div>
</div>

<script>
    let peer = null, conn = null;
    let arquivoAtual = null;
    const CHUNK_SIZE = 16384; // 16KB estável para Smart TVs

    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });

    peer.on('open', () => {
        const codeFromUrl = new URLSearchParams(window.location.search).get('c');
        if (codeFromUrl) {
            document.getElementById('target-code').value = codeFromUrl;
            setTimeout(connectByCode, 600);
        }
    });

    function connectByCode() {
        let code = document.getElementById('target-code').value.trim().toUpperCase();
        if(!code) return;
        
        conn = peer.connect("dinho-sala-" + code);
        
        conn.on('open', () => {
            document.getElementById('setup-zone').classList.add('hidden');
            document.getElementById('share-zone').classList.remove('hidden');
            setupCelularReceiver();
        });
    }

    function setupCelularReceiver() {
        // Escuta as respostas de sincronia vindas da TV
        conn.on('data', (data) => {
            if (data.meta === 'ack' && arquivoAtual) {
                enviarProximoBloco(data.nextOffset);
            }
        });
    }

    function sendText() {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        conn.send({ type: 'text', content: input.value });
        const box = document.getElementById('chat-box');
        const div = document.createElement('div'); div.classList.add('msg','me'); div.innerText = input.value;
        box.appendChild(div); input.value = '';
    }

    function sendFileChunks() {
        const fileInput = document.getElementById('file-input');
        arquivoAtual = fileInput.files[0];
        if (!arquivoAtual) return alert('Selecione um arquivo.');

        document.getElementById('status-progress').innerText = `Iniciando envio: 0%`;
        
        // Avisa a TV que vai começar
        conn.send({ meta: 'file-start', name: arquivoAtual.name, type: arquivoAtual.type, size: arquivoAtual.size });
    }

    function enviarProximoBloco(offset) {
        if (offset < arquivoAtual.size) {
            const reader = new FileReader();
            const slice = arquivoAtual.slice(offset, offset + CHUNK_SIZE);
            
            reader.onload = function(e) {
                conn.send({ meta: 'file-chunk', chunk: e.target.result });
                let progresso = Math.floor((offset / arquivoAtual.size) * 100);
                document.getElementById('status-progress').innerText = `Enviando: ${progresso}%`;
            };
            reader.readAsArrayBuffer(slice);
        } else {
            // Fim total da transmissão
            conn.send({ meta: 'file-end' });
            document.getElementById('status-progress').innerText = "✓ Enviado com sucesso!";
            arquivoAtual = null;
        }
    }
</script>
</body>
</html>
